# Config for DCGAN with 128x128 images

# Model architecture
model_name: dcgan

# Directories
data_dir: data
output_dir: outputs/dcgan_128

# Image settings
image_size: 128
image_channels: 3
latent_dim: 100

# Training hyperparameters
batch_size: 64
num_epochs: 100
learning_rate: 0.0002
beta1: 0.5
beta2: 0.999
num_workers: 0
random_seed: 42

# Output settings
num_sample_images: 16
sample_every: 5
checkpoint_every: 5